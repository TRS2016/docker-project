name: CI/CD — Build, Push & Deploy

on:
  push:
    branches: [main]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code
        uses: actions/checkout@v5

      - name: Login sur Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build et Push de l'image
        uses: docker/build-push-action@v6
        with:
          context: ./app
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/docker-project:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/docker-project:${{ github.sha }}

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Déploiement sur EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Récupère la dernière image
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/docker-project:latest

            # Met à jour le docker-compose.yml pour utiliser l'image du registry
            export DOCKER_IMAGE=${{ secrets.DOCKERHUB_USERNAME }}/docker-project:latest

            # Redémarre la stack
            cd ~
            docker compose down
            docker compose up -d

            # Vérifie que tout tourne
            docker compose ps
